<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スイスドロー記録分布推定ツール</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>スイスドロー記録分布推定ツール</h1>

<div class="input-section">
  <h2>参加者設定</h2>
  <div class="row">
    <label for="totalPlayers">総参加者数</label>
    <input type="number" id="totalPlayers" min="1" value="0">
    <span>人</span>
  </div>
  <div class="row">
    <label>bye保持者数</label>
    <div class="bye-inputs">
      <span class="bye-group"><span>1bye:</span><input type="number" id="bye1" min="0" value="0"><span>人</span></span>
      <span class="bye-group"><span>2bye:</span><input type="number" id="bye2" min="0" value="0"><span>人</span></span>
      <span class="bye-group"><span>3bye:</span><input type="number" id="bye3" min="0" value="0"><span>人</span></span>
    </div>
  </div>
</div>

<div id="output-top">
  <div id="output-grid"></div>
  <div id="output-info"></div>
  <div id="output-tables"></div>
  <p id="pairDownNotice" class="notice">※ ペアダウン勝者前提の推定値。実際はドロップ・意図的な引き分け等でずれる場合あり。</p>
</div>

<div class="input-section">
  <h2>ラウンド設定</h2>
  <div class="row radio-row">
    <label>ラウンド数</label>
    <label><input type="radio" name="roundMode" value="auto" checked> 規定（自動）</label>
    <label><input type="radio" name="roundMode" value="manual"> 手動指定</label>
  </div>
  <div class="row indent" id="manualRoundRow" style="display:none;">
    <label for="manualRounds">ラウンド数を指定</label>
    <input type="number" id="manualRounds" min="1" max="20" value="8">
    <span>ラウンド</span>
  </div>
  <div class="row">
    <label for="finalDraft">リミテッド決勝ドラフト</label>
    <input type="checkbox" id="finalDraft">
    <span class="notice">（9〜16人時のラウンド数・カット区分に影響）</span>
  </div>
</div>

<div class="input-section">
  <h2>表示設定</h2>
  <div class="row radio-row">
    <label>カット強調表示</label>
    <label><input type="radio" name="cutMode" value="auto" checked> 自動</label>
    <label><input type="radio" name="cutMode" value="top8"> Top8</label>
    <label><input type="radio" name="cutMode" value="top4"> Top4</label>
    <label><input type="radio" name="cutMode" value="none"> なし</label>
  </div>
</div>

<div id="output-tables"></div>

<script src="js/script.js"></script>
</body>
</html>
